<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GabyTronicX Smart Hub</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-blue: #0a84ff;
            --ios-green: #30d158;
            --ios-red: #ff453a;
            --ios-text: #ffffff;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: row; /* Optimizado para modo horizontal */
        }

        /* Panel Izquierdo: Clima y Estado */
        .weather-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 1px solid #333;
        }

        #temp { font-size: 5rem; font-weight: 200; margin: 0; }
        #city { font-size: 1.2rem; color: #8e8e93; margin-bottom: 20px; }
        
        .status-badge {
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: 0.5s;
        }

        .good { background-color: rgba(48, 209, 88, 0.2); color: var(--ios-green); }
        .bad { background-color: rgba(255, 69, 58, 0.2); color: var(--ios-red); }

        /* Panel Derecho: Controles */
        .control-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            background-color: var(--ios-card);
        }

        .btn {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.9); }
        .btn-flash { background-color: #3a3a3c; color: #ffd60a; font-size: 2rem; }
        .btn-music { background-color: #ff0000; color: white; font-size: 1.5rem; }

        svg { width: 40px; height: 40px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="weather-panel">
        <div id="city">Santo Domingo</div>
        <div id="temp">--°</div>
        <div id="status-text" class="status-badge">Cargando datos...</div>
    </div>

    <div class="control-panel">
        <button class="btn btn-flash" onclick="openFlash()">
            ⚡
        </button>
        
        <button class="btn btn-music" onclick="openMusic()">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-12.5v9l7.5-4.5z"/></svg>
        </button>
    </div>

    <script>
        const API_KEY = '5343e91cfc25a37801a4a9134b3240d0'; // <--- PEGA TU LLAVE AQUÍ
        const CIUDAD = 'Santo Domingo,do';

        async function updateHub() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CIUDAD}&appid=${API_KEY}&units=metric`);
                const data = await res.json();
                
                // Actualizar Temperatura
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°`;

                const clima = data.weather[0].main; //
                const hora = new Date().getHours();
                const badge = document.getElementById('status-text');

                // Lógica de Lavado: 6:00 AM a 3:00 PM (15h) Y sin lluvia
                const esBuenHorario = (hora >= 6 && hora < 15);
                const vaALlover = clima.includes("Rain") || clima.includes("Drizzle") || clima.includes("Thunderstorm");

                if (!vaALlover && esBuenHorario) {
                    badge.innerText = "🟢 Buen momento para lavar";
                    badge.className = "status-badge good";
                } else {
                    badge.innerText = "🔴 Mal momento para lavar";
                    badge.className = "status-badge bad";
                }

            } catch (e) { console.log("Error de conexión"); }
        }

        function openFlash() {
            window.location.href = "intent://#Intent;action=android.media.action.STILL_IMAGE_CAMERA;end";
        }

        function openMusic() {
            window.location.href = "https://music.youtube.com";
        }

        // Actualizar cada 15 min
        updateHub();
        setInterval(updateHub, 900000);
    </script>
</body>
</html>
