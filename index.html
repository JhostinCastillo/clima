<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>GabyTronicX Hub</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-green: #30d158;
            --ios-red: #ff453a;
            --ios-text: #ffffff;
            --ios-gray: #8e8e93;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            flex-direction: row;
        }

        .left-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 1px solid #333;
        }

        #city { font-size: 1rem; color: var(--ios-gray); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 5px; }
        
        #temp { 
            font-size: 8.5rem; 
            font-weight: 100; 
            margin: 0; 
            letter-spacing: -5px; 
        }
        
        .status-badge {
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 20px;
            border: 1px solid transparent;
            text-align: center;
        }

        .good { background-color: rgba(48, 209, 88, 0.1); color: var(--ios-green); border-color: var(--ios-green); }
        .bad { background-color: rgba(255, 69, 58, 0.1); color: var(--ios-red); border-color: var(--ios-red); }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--ios-card);
            gap: 45px;
        }

        .btn {
            width: 105px;
            height: 105px;
            border-radius: 28px;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }
        .btn-spotify { background: #1DB954; color: white; }
        .btn-ytmusic { background: #ff0000; color: white; }
        svg { width: 55px; height: 55px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div id="city">Santo Domingo</div>
        <div id="temp">--°</div>
        <div id="status-text" class="status-badge">Sincronizando...</div>
    </div>

    <div class="right-panel">
        <button class="btn btn-spotify" onclick="window.location.href='https://open.spotify.com/'">
            <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.494 17.306c-.216.353-.672.464-1.024.249-2.812-1.718-6.351-2.106-10.518-1.154-.403.092-.81-.161-.902-.564-.092-.403.161-.81.564-.902 4.564-1.042 8.486-.594 11.63 1.326.353.215.464.671.25 1.025zm1.467-3.259c-.272.443-.847.585-1.29.313-3.22-1.977-8.125-2.55-11.93-1.396-.499.151-1.025-.133-1.177-.632-.151-.499.133-1.025.632-1.177 4.354-1.321 9.774-.673 13.453 1.585.443.272.585.847.312 1.29zm.126-3.415C15.226 8.35 8.847 8.138 5.16 9.256c-.576.175-1.18-.153-1.355-.73-.175-.576.153-1.18.73-1.355 4.225-1.284 11.275-1.034 15.716 1.602.518.308.687.978.379 1.496-.308.518-.978.687-1.496.379z"/></svg>
        </button>
        
        <button class="btn btn-ytmusic" onclick="window.location.href='https://music.youtube.com/'">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-12.5v9l7.5-4.5z"/></svg>
        </button>
    </div>

    <script>
        const API_KEY = '5343e91cfc25a37801a4a9134b3240d0';
        const CIUDAD = 'Santo Domingo,do';

        async function updateWeather() {
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CIUDAD}&appid=${API_KEY}&units=metric`);
                const data = await response.json();
                if(data.main) {
                    document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                    const condition = data.weather[0].main;
                    const hour = new Date().getHours();
                    const badge = document.getElementById('status-text');
                    const isRainy = /Rain|Drizzle|Thunderstorm/i.test(condition);
                    const isLaundryTime = (hour >= 6 && hour < 15);

                    if (!isRainy && isLaundryTime) {
                        badge.innerText = "🟢 Buen momento para lavar";
                        badge.className = "status-badge good";
                    } else {
                        badge.innerText = "🔴 Mal momento para lavar";
                        badge.className = "status-badge bad";
                    }
                }
            } catch (e) { console.log("Error de conexión"); }
        }
        updateWeather();
        setInterval(updateWeather, 600000); // 10 minutos
    </script>
</body>
</html>
