<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Clima</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .panel-info {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #222;
        }
        #temp { font-size: 9rem; font-weight: bold; margin: 0; }
        .badge {
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .good { color: #30d158; border: 1px solid #30d158; }
        .bad { color: #ff453a; border: 1px solid #ff453a; }
        
        .panel-btns {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #111;
            gap: 40px;
        }
        .btn {
            width: 100px; height: 100px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-sp { background: #1DB954; }
        .btn-yt { background: #ff0000; }
        svg { width: 50px; height: 50px; fill: #fff; }
    </style>
</head>
<body>
    <div class="panel-info">
        <div style="color: #666; letter-spacing: 2px;">SDQ - CLIMA</div>
        <div id="temp">--°</div>
        <div id="status" class="badge">...</div>
    </div>
    <div class="panel-btns">
        <button class="btn btn-sp" onclick="window.location.href='https://open.spotify.com/section/0JQ5DAqbMKFzH9vY3S9999?autoplay=1'">
            <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.494 17.306c-.216.353-.672.464-1.024.249-2.812-1.718-6.351-2.106-10.518-1.154-.403.092-.81-.161-.902-.564-.092-.403.161-.81.564-.902 4.564-1.042 8.486-.594 11.63 1.326.353.215.464.671.25 1.025zm1.467-3.259c-.272.443-.847.585-1.29.313-3.22-1.977-8.125-2.55-11.93-1.396-.499.151-1.025-.133-1.177-.632-.151-.499.133-1.025.632-1.177 4.354-1.321 9.774-.673 13.453 1.585.443.272.585.847.312 1.29zm.126-3.415C15.226 8.35 8.847 8.138 5.16 9.256c-.576.175-1.18-.153-1.355-.73-.175-.576.153-1.18.73-1.355 4.225-1.284 11.275-1.034 15.716 1.602.518.308.687.978.379 1.496-.308.518-.978.687-1.496.379z"/></svg>
        </button>
        <button class="btn btn-yt" onclick="window.location.href='https://music.youtube.com/playlist?list=RDAMVMdQw4w9WgXcQ&autoplay=1'">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-12.5v9l7.5-4.5z"/></svg>
        </button>
    </div>
    <script>
        const API = '5343e91cfc25a37801a4a9134b3240d0';
        async function getData() {
            try {
                const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Santo Domingo,do&appid=${API}&units=metric`);
                const d = await r.json();
                document.getElementById('temp').innerText = Math.round(d.main.temp) + "°";
                const rain = /Rain|Drizzle|Thunderstorm/i.test(d.weather[0].main);
                const hour = new Date().getHours();
                const ok = (hour >= 6 && hour < 15) && !rain;
                const b = document.getElementById('status');
                b.innerText = ok ? "🟢 LAVAR OK" : "🔴 NO LAVAR";
                b.className = "badge " + (ok ? "good" : "bad");
            } catch(e) {}
        }
        getData(); setInterval(getData, 600000);
    </script>
</body>
</html>
