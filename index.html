<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clima/title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-green: #30d158;
            --ios-red: #ff453a;
            --ios-text: #ffffff;
            --ios-gray: #8e8e93;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: row;
        }

        /* Panel Izquierdo: Información */
        .left-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 1px solid #333;
        }

        #temp { font-size: 6rem; font-weight: 200; margin: 0; letter-spacing: -2px; }
        #city { font-size: 1.2rem; color: var(--ios-gray); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .status-badge {
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.5s ease;
            margin-top: 20px;
        }

        .good { background-color: rgba(48, 209, 88, 0.15); color: var(--ios-green); border: 1px solid var(--ios-green); }
        .bad { background-color: rgba(255, 69, 58, 0.15); color: var(--ios-red); border: 1px solid var(--ios-red); }

        /* Espejo / Cámara */
        #mirror-container {
            width: 80%;
            max-width: 300px;
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 2px solid var(--ios-blue);
        }
        #video-feed { width: 100%; transform: scaleX(-1); }

        /* Panel Derecho: Controles */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--ios-card);
            gap: 40px;
        }

        .btn {
            width: 90px;
            height: 90px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:active { transform: scale(0.92); opacity: 0.8; }
        .btn-flash { background: linear-gradient(145deg, #3a3a3c, #2c2c2e); color: #ffd60a; font-size: 2.5rem; }
        .btn-music { background: linear-gradient(145deg, #ff453a, #bf360c); color: white; }

        svg { width: 45px; height: 45px; fill: currentColor; }
    </style>
</head>
<body>

    <div class="left-panel">
        <div id="city">Santo Domingo</div>
        <div id="temp">--°</div>
        <div id="status-text" class="status-badge">Sincronizando...</div>
        
        <div id="mirror-container">
            <video id="video-feed" autoplay playsinline></video>
        </div>
    </div>

    <div class="right-panel">
        <button class="btn btn-flash" onclick="toggleMirror()" title="Activar Espejo">
            ⚡
        </button>
        
        <button class="btn btn-music" onclick="window.location.href='https://music.youtube.com'">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-12.5v9l7.5-4.5z"/></svg>
        </button>
    </div>

    <script>
        const API_KEY = '5343e91cfc25a37801a4a9134b3240d0'; 
        const CIUDAD = 'Santo Domingo,do';
        let isMirrorOn = false;

        async function updateWeather() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CIUDAD}&appid=${API_KEY}&units=metric`);
                const data = await res.json();
                
                document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°`;

                const clima = data.weather[0].main;
                const hora = new Date().getHours();
                const badge = document.getElementById('status-text');

                // Lógica personalizada: 6am a 3pm y sin lluvia
                const esHorarioLavado = (hora >= 6 && hora < 15);
                const lluviaDetectada = /Rain|Drizzle|Thunderstorm/i.test(clima);

                if (!lluviaDetectada && esHorarioLavado) {
                    badge.innerText = "🟢 Buen momento para lavar";
                    badge.className = "status-badge good";
                } else {
                    badge.innerText = "🔴 Mal momento para lavar";
                    badge.className = "status-badge bad";
                }
            } catch (e) { 
                document.getElementById('status-text').innerText = "Sin conexión";
            }
        }

        async function toggleMirror() {
            const container = document.getElementById('mirror-container');
            const video = document.getElementById('video-feed');

            if (!isMirrorOn) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user" } 
                    });
                    video.srcObject = stream;
                    container.style.display = "block";
                    isMirrorOn = true;
                } catch (err) {
                    alert("Para el espejo, permite el acceso a la cámara en los ajustes de Fully Kiosk.");
                }
            } else {
                const tracks = video.srcObject.getTracks();
                tracks.forEach(track => track.stop());
                container.style.display = "none";
                isMirrorOn = false;
            }
        }

        // Actualización automática cada 15 min
        updateWeather();
        setInterval(updateWeather, 900000);
    </script>
</body>
</html>
