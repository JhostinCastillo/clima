<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    
    <title>GabyTronicX Smart Hub</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-green: #30d158;
            --ios-red: #ff453a;
            --ios-text: #ffffff;
            --ios-gray: #8e8e93;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            flex-direction: row;
        }

        /* Capa de Luz Blanca (Oculta por defecto) */
        #light-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #ffffff;
            display: none;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #light-overlay span { color: #000; font-weight: bold; font-size: 1.2rem; }

        /* Panel Izquierdo: Clima */
        .left-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-right: 1px solid #333;
        }

        #temp { font-size: 8rem; font-weight: 200; margin: 0; letter-spacing: -4px; }
        #city { font-size: 1rem; color: var(--ios-gray); text-transform: uppercase; letter-spacing: 2px; }
        
        .status-badge {
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 25px;
            text-align: center;
        }
        .good { background-color: rgba(48, 209, 88, 0.1); color: var(--ios-green); border: 1px solid var(--ios-green); }
        .bad { background-color: rgba(255, 69, 58, 0.1); color: var(--ios-red); border: 1px solid var(--ios-red); }

        /* Panel Derecho: Botones */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--ios-card);
            gap: 50px;
        }

        .btn {
            width: 100px;
            height: 100px;
            border-radius: 28px;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.9); }
        .btn-flash { background: #3a3a3c; color: #ffd60a; font-size: 2.8rem; }
        .btn-music { background: #ff453a; color: white; }
        svg { width: 50px; height: 50px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="light-overlay" onclick="toggleLight()">
        <span>TOCA PARA VOLVER</span>
    </div>

    <div class="left-panel">
        <div id="city">Santo Domingo</div>
        <div id="temp">--°</div>
        <div id="status-text" class="status-badge">Sincronizando...</div>
    </div>

    <div class="right-panel">
        <div class="btn btn-flash" onclick="toggleLight()">⚡</div>
        <div class="btn btn-music" onclick="window.location.href='https://music.youtube.com'">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-12.5v9l7.5-4.5z"/></svg>
        </div>
    </div>

    <script>
        const API_KEY = '5343e91cfc25a37801a4a9134b3240d0';
        const CIUDAD = 'Santo Domingo,do';

        async function getClima() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CIUDAD}&appid=${API_KEY}&units=metric`);
                const data = await res.json();
                
                if(data.main) {
                    document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                    const condition = data.weather[0].main;
                    const hour = new Date().getHours();
                    const badge = document.getElementById('status-text');

                    // Lógica: 6:00 a 15:00 y sin lluvia
                    const isRainy = /Rain|Drizzle|Thunderstorm/i.test(condition);
                    const isDaytime = (hour >= 6 && hour < 15);

                    if (!isRainy && isDaytime) {
                        badge.innerText = "🟢 Buen momento para lavar";
                        badge.className = "status-badge good";
                    } else {
                        badge.innerText = "🔴 Mal momento para lavar";
                        badge.className = "status-badge bad";
                    }
                }
            } catch (e) { console.log("Error API"); }
        }

        function toggleLight() {
            const overlay = document.getElementById('light-overlay');
            if (overlay.style.display === "flex") {
                overlay.style.display = "none";
            } else {
                overlay.style.display = "flex";
            }
        }

        getClima();
        setInterval(getClima, 600000); // 10 min
    </script>
</body>
</html>
