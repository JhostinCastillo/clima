<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GabyTronicX Hub</title>
    <style>
        :root {
            --ios-bg: #000000;
            --ios-card: #1c1c1e;
            --ios-green: #30d158;
            --ios-red: #ff453a;
            --ios-text: #ffffff;
        }

        body {
            background-color: var(--ios-bg);
            color: var(--ios-text);
            font-family: -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* LUZ FRONTAL (OCULTA) */
        #flash-light {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffffff;
            display: none;
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }
        #flash-light span { color: #000; font-weight: bold; font-size: 1.5rem; }

        .left-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #temp { font-size: 8rem; font-weight: 200; margin: 0; }
        
        .status-badge {
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 20px;
        }
        .good { background-color: rgba(48, 209, 88, 0.1); color: var(--ios-green); border: 1px solid var(--ios-green); }
        .bad { background-color: rgba(255, 69, 58, 0.1); color: var(--ios-red); border: 1px solid var(--ios-red); }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--ios-card);
            gap: 50px;
        }

        .btn {
            width: 100px; height: 100px;
            border-radius: 30px;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .btn-flash { background: #3a3a3c; color: #ffd60a; font-size: 3rem; }
        .btn-music { background: #ff453a; color: white; }
        svg { width: 50px; height: 50px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="flash-light" onclick="toggleFlash()">
        <span>TOCA PARA VOLVER</span>
    </div>

    <div class="left-panel">
        <div style="color:#8e8e93; letter-spacing:2px;">SANTO DOMINGO</div>
        <div id="temp">--°</div>
        <div id="status-text" class="status-badge">Sincronizando...</div>
    </div>

    <div class="right-panel">
        <button class="btn btn-flash" onclick="toggleFlash()">⚡</button>
        <button class="btn btn-music" onclick="window.location.href='https://music.youtube.com'">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-12.5v9l7.5-4.5z"/></svg>
        </button>
    </div>

    <script>
        const API_KEY = '5343e91cfc25a37801a4a9134b3240d0';
        const CIUDAD = 'Santo Domingo,do';

        async function getClima() {
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CIUDAD}&appid=${API_KEY}&units=metric`);
                const data = await res.json();
                if(data.main) {
                    document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                    const condition = data.weather[0].main;
                    const hour = new Date().getHours();
                    const badge = document.getElementById('status-text');

                    const isRainy = /Rain|Drizzle|Thunderstorm/i.test(condition);
                    const isLaundryTime = (hour >= 6 && hour < 15);

                    if (!isRainy && isLaundryTime) {
                        badge.innerText = "🟢 Buen momento para lavar";
                        badge.className = "status-badge good";
                    } else {
                        badge.innerText = "🔴 Mal momento para lavar";
                        badge.className = "status-badge bad";
                    }
                }
            } catch (e) { console.log("Error"); }
        }

        function toggleFlash() {
            const overlay = document.getElementById('flash-light');
            overlay.style.display = (overlay.style.display === "flex") ? "none" : "flex";
        }

        getClima();
        setInterval(getClima, 600000);
    </script>
</body>
</html>
